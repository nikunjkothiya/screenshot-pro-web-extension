<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnapShot Pro</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">

    <!-- ── Header ─────────────────────────────────────── -->
    <header class="header">
      <div class="header-logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <defs>
            <linearGradient id="logoGrad" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse">
              <stop stop-color="#a78bfa"/>
              <stop offset="1" stop-color="#38bdf8"/>
            </linearGradient>
          </defs>
          <rect x="1.5" y="6" width="21" height="14" rx="2.5" fill="url(#logoGrad)" opacity=".9"/>
          <path d="M8.5 6 L10 3.5 H14 L15.5 6" stroke="url(#logoGrad)" stroke-width="1.4"
                stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="12" cy="13" r="3.6" stroke="white" stroke-width="1.6"/>
          <circle cx="12" cy="13" r="1.6" fill="white" opacity=".35"/>
          <circle cx="18" cy="9.5" r="1" fill="white" opacity=".7"/>
        </svg>
      </div>
      <div class="header-text">
        <span class="header-name">SnapShot Pro</span>
        <span class="header-tagline">Universal Screenshot</span>
      </div>
    </header>

    <!-- ── Main UI ─────────────────────────────────────── -->
    <div id="view-main">

      <div class="mode-label">CAPTURE MODE</div>

      <div class="btn-list">

        <button class="cap-btn" id="btn-visible">
          <span class="cap-icon" data-color="violet">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </span>
          <span class="cap-info">
            <span class="cap-title">Visible Page</span>
            <span class="cap-desc">Capture what's on screen right now</span>
          </span>
          <span class="cap-arrow">›</span>
        </button>

        <button class="cap-btn" id="btn-fullpage">
          <span class="cap-icon" data-color="blue">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <path d="M3 9h18M3 15h18M9 3v18M15 3v18" opacity=".5"/>
              <rect x="3" y="3" width="18" height="18" rx="2"/>
            </svg>
          </span>
          <span class="cap-info">
            <span class="cap-title">Full Page</span>
            <span class="cap-desc">Entire page — auto scrolls &amp; stitches</span>
          </span>
          <span class="cap-arrow">›</span>
        </button>

        <button class="cap-btn" id="btn-area">
          <span class="cap-icon" data-color="cyan">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 9V5a2 2 0 0 1 2-2h4"/>
              <path d="M15 3h4a2 2 0 0 1 2 2v4"/>
              <path d="M21 15v4a2 2 0 0 1-2 2h-4"/>
              <path d="M9 21H5a2 2 0 0 1-2-2v-4"/>
              <rect x="8" y="8" width="8" height="8" rx="1" stroke-dasharray="2.5 1.5"/>
            </svg>
          </span>
          <span class="cap-info">
            <span class="cap-title">Select Area</span>
            <span class="cap-desc">Draw a custom region on the page</span>
          </span>
          <span class="cap-arrow">›</span>
        </button>

      </div>

      <!-- Last Screenshot Strip -->
      <div class="last-wrap" id="last-wrap" style="display:none">
        <div class="last-header">
          <span class="last-label">LAST CAPTURE</span>
          <div class="last-btns">
            <button class="icon-btn" id="last-copy" title="Copy to clipboard">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2"/>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
              </svg>
            </button>
            <button class="icon-btn" id="last-dl" title="Download again">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="last-thumb-wrap">
          <img class="last-thumb" id="last-thumb" src="" alt="Last screenshot">
        </div>
      </div>

    </div><!-- /view-main -->


    <!-- ── Loading State ───────────────────────────────── -->
    <div id="view-loading" class="state-view" style="display:none">
      <div class="spinner-ring"></div>
      <p class="state-title" id="loading-title">Capturing…</p>
      <p class="state-sub"  id="loading-sub">Please wait</p>
      <div class="progress-track">
        <div class="progress-bar" id="progress-bar" style="width:5%"></div>
      </div>
    </div>


    <!-- ── Error State ─────────────────────────────────── -->
    <div id="view-error" class="state-view" style="display:none">
      <div class="err-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </div>
      <p class="state-title err-title" id="error-title">Something went wrong</p>
      <p class="state-sub err-sub" id="error-msg"></p>
      <button class="btn-ghost" id="btn-err-back">← Go Back</button>
    </div>


    <!-- ── Success / Preview State ────────────────────── -->
    <div id="view-success" class="state-view" style="display:none">
      <div class="preview-frame">
        <img id="preview-img" class="preview-img" src="" alt="Screenshot preview">
        <div class="preview-type-badge" id="preview-type"></div>
      </div>
      <div class="success-row">
        <button class="btn-ghost sm" id="btn-suc-back">← New</button>
        <button class="btn-primary" id="btn-suc-dl">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Download
        </button>
        <button class="btn-icon-sq" id="btn-suc-copy" title="Copy to clipboard">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
        </button>
      </div>
      <p class="success-note" id="success-note">Opened in editor</p>
    </div>


    <footer class="footer">Works on all pages · Extensions · PDFs · File URLs</footer>

  </div><!-- /app -->

  <script src="popup.js"></script>
</body>
</html>
